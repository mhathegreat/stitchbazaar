<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 64" role="img" aria-label="StitchBazaar logo">
  <!-- Amber circle icon -->
  <circle cx="32" cy="32" r="28" fill="#C88B00"/>
  <!-- Needle -->
  <line x1="22" y1="44" x2="42" y2="20" stroke="#FFFCF5" stroke-width="2.5" stroke-linecap="round"/>
  <ellipse cx="42" cy="20" rx="4" ry="2.5" transform="rotate(-50 42 20)" fill="#FFFCF5"/>
  <circle cx="22" cy="44" r="2" fill="#FFFCF5"/>
  <!-- Thread arc -->
  <path d="M42,20 Q55,38 38,48" stroke="#E0A500" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Wordmark: Stitch -->
